# dispatched run always uses the target ref's own ci-intel.yml.
name: build-intel

on:
  workflow_dispatch:

jobs:
  stub:
    runs-on: ubuntu-latest
    steps:
      - run: echo "registry stub — dispatch with --ref <branch> carrying the real ci-intel.yml"
